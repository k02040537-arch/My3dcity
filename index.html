<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nitesh | Pro City Metaverse</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap');
        body { margin: 0; overflow: hidden; background-color: #020204; font-family: 'Outfit', sans-serif; touch-action: none; }
        
        #ui { position: absolute; top: 30px; left: 30px; color: #fff; pointer-events: none; z-index: 10; }
        #ui h1 { margin: 0; font-size: 24px; letter-spacing: 2px; color: #00ffcc; text-transform: uppercase; }
        
        #mobile-controls { 
            position: absolute; bottom: 40px; left: 40px; 
            width: 120px; height: 120px; border-radius: 50%; 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            z-index: 50; display: none;
        }
        #joystick-knob { 
            position: absolute; top: 50%; left: 50%; 
            width: 45px; height: 45px; background: #fff; 
            border-radius: 50%; transform: translate(-50%, -50%); 
        }
        @media (max-width: 768px) { #mobile-controls { display: block; } }

        #loader { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #020204; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: #fff; z-index: 999;
        }
        .spinner { width: 30px; height: 30px; border: 2px solid #333; border-top-color: #00ffcc; border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p>LOADING WORLD</p></div>
<div id="ui"><h1>NITESH SPACE</h1></div>
<div id="mobile-controls"><div id="joystick-knob"></div></div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const CITY_URL = 'https://raw.githubusercontent.com/k02040537-arch/My3dcity/main/city.glb';

const myLinks = [
    { name: 'INSTAGRAM', url: 'https://www.instagram.com/nitesh_jord', logo: 'https://img.icons8.com/fluency/256/instagram-new.png', x: -7, z: -7 },
    { name: 'FACEBOOK', url: 'https://www.facebook.com/share/18FQsJrDJ5/', logo: 'https://img.icons8.com/color/256/facebook-new.png', x: -7, z: 7 },
    { name: 'GOD NOVEL HINDI', url: 'https://t.me/bhuimharniteshbhuimhar2', logo: 'https://img.icons8.com/color/256/telegram-app.png', x: 7, z: -7 },
    { name: 'WHATSAPP', url: 'https://wa.me/917718906857', logo: 'https://img.icons8.com/color/256/whatsapp--v1.png', x: 7, z: 7 }
];

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020204, 0.05);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.6, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 1.2));

const loader = new GLTFLoader();
loader.load(CITY_URL, (gltf) => {
    scene.add(gltf.scene);
    document.getElementById('loader').remove();
}, undefined, (e) => {
    console.error(e);
    document.getElementById('loader').innerHTML = "ERROR LOADING MODEL. CHECK FILENAME!";
});

const targets = [];
const texLoader = new THREE.TextureLoader();

myLinks.forEach(link => {
    const group = new THREE.Group();
    group.position.set(link.x, 0, link.z);
    
    // Name Label
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 512; canvas.height = 128;
    ctx.font = 'bold 44px Outfit'; ctx.fillStyle = 'white'; ctx.textAlign = 'center';
    ctx.fillText(link.name, 256, 80);
    const label = new THREE.Sprite(new THREE.SpriteMaterial({map: new THREE.CanvasTexture(canvas)}));
    label.scale.set(4, 1, 1); label.position.y = 3;
    group.add(label);

    texLoader.load(link.logo, (t) => {
        const s = new THREE.Sprite(new THREE.SpriteMaterial({map: t}));
        s.scale.set(1.5, 1.5, 1); s.position.y = 1.5;
        s.userData.url = link.url;
        targets.push(s); group.add(s);
    });
    scene.add(group);
});

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.maxPolarAngle = Math.PI/2 - 0.05;

const joystick = { x: 0, y: 0 };
const jZone = document.getElementById('mobile-controls'), jKnob = document.getElementById('joystick-knob');
let jActive = false, jStart = { x: 0, y: 0 };

jZone.ontouchstart = (e) => { jActive = true; jStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
jZone.ontouchmove = (e) => {
    if(!jActive) return;
    let dx = e.touches[0].clientX - jStart.x, dy = e.touches[0].clientY - jStart.y;
    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
    const angle = Math.atan2(dy, dx);
    jKnob.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
    joystick.x = (Math.cos(angle)*dist)/40; joystick.y = -(Math.sin(angle)*dist)/40;
};
jZone.ontouchend = () => { jActive = false; joystick.x = 0; joystick.y = 0; jKnob.style.transform = 'translate(-50%, -50%)'; };

function update() {
    const f = new THREE.Vector3(); camera.getWorldDirection(f); f.y = 0; f.normalize();
    const r = new THREE.Vector3().crossVectors(f, camera.up).normalize();
    if (joystick.x || joystick.y) {
        const m = f.multiplyScalar(joystick.y * 0.15).add(r.multiplyScalar(joystick.x * 0.15));
        camera.position.add(m); controls.target.add(m);
    }
    controls.update(); renderer.render(scene, camera); requestAnimationFrame(update);
}
update();

window.onclick = (e) => {
    const ray = new THREE.Raycaster();
    ray.setFromCamera({ x: (e.clientX/window.innerWidth)*2-1, y: -(e.clientY/window.innerHeight)*2+1 }, camera);
    const hits = ray.intersectObjects(targets);
    if (hits.length) window.open(hits[0].object.userData.url, '_blank');
};
</script>
</body>
</html>
